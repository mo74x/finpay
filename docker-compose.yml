version: '3.9'

services:
  # ─── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finpay
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - '9200:9200'
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9200/_cluster/health || exit 1']
      interval: 10s
      timeout: 10s
      retries: 10

  # ─── Application Services ────────────────────────────────────────────────────
  core-ledger:
    build:
      context: .
      dockerfile: apps/core-ledger/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/finpay?schema=public
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      NODE_ENV: production
    ports:
      - '8877:8877'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-notifications:
    build:
      context: .
      dockerfile: apps/worker-notifications/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/finpay?schema=public
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      ELASTICSEARCH_NODE: http://elasticsearch:9200
      JWT_SECRET: change-me-in-production
      PORT: '3000'
      NODE_ENV: production
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      core-ledger:
        condition: service_started

volumes:
  postgres_data:
  elasticsearch_data:
